<aside
  class="fixed inset-y-0 left-0 z-50 flex w-64 flex-col border-r border-slate-700/50 bg-[#111827] shadow-card transition-transform duration-200 lg:static lg:translate-x-0"
  :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
>
  <div class="flex h-16 items-center gap-2 border-b border-slate-700/50 px-5">
    <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-primary text-sm font-bold text-white">CV</div>
    <div>
      <p class="text-sm font-semibold text-white">Resume</p>
      <p class="text-xs text-slate-500">Boshqaruv paneli</p>
    </div>
    <button type="button" class="ml-auto rounded-lg p-1.5 text-slate-400 hover:bg-slate-800 lg:hidden" @click="sidebarOpen = false" aria-label="Yopish">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <nav class="flex-1 space-y-1 overflow-y-auto p-3" aria-label="Asosiy menyu">
    {% with s=section|default:"" %}
    <a href="{% url 'dashboard:index' %}" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if s == 'dashboard' %}bg-primary text-white shadow-soft{% else %}text-slate-400 hover:bg-slate-800/80 hover:text-white{% endif %}">
      <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
      Dashboard
    </a>
    <a href="{% url 'dashboard:certificates' %}" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if s == 'certificates' %}bg-primary text-white shadow-soft{% else %}text-slate-400 hover:bg-slate-800/80 hover:text-white{% endif %}">
      <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
      Sertifikatlar
    </a>
    <a href="{% url 'dashboard:interests' %}" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if s == 'interests' %}bg-primary text-white shadow-soft{% else %}text-slate-400 hover:bg-slate-800/80 hover:text-white{% endif %}">
      <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      Qiziqishlar
    </a>
    <a href="{% url 'dashboard:profile' %}" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if s == 'profile' %}bg-primary text-white shadow-soft{% else %}text-slate-400 hover:bg-slate-800/80 hover:text-white{% endif %}">
      <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Profil
    </a>
    <a href="{% url 'dashboard:settings' %}" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if s == 'settings' %}bg-primary text-white shadow-soft{% else %}text-slate-400 hover:bg-slate-800/80 hover:text-white{% endif %}">
      <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 000 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 000-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Sozlamalar
    </a>
    {% endwith %}
  </nav>

  <div class="border-t border-slate-700/50 p-3">
    {% if user.is_authenticated %}
    <p class="truncate px-2 text-xs text-slate-500">{{ user.email|default:user.username }}</p>
    <div class="mt-2 flex gap-2">
      <form method="post" action="{% url 'dashboard:logout' %}" class="flex-1">
        {% csrf_token %}
        <button type="submit" class="w-full rounded-xl border border-slate-600 py-2 text-xs font-medium text-slate-300 transition hover:bg-slate-800">Chiqish</button>
      </form>
      <a href="{% url 'resume:home' %}" class="flex-1 rounded-xl border border-secondary/40 py-2 text-center text-xs font-medium text-secondary transition hover:bg-secondary/10">Sayt</a>
    </div>
    {% endif %}
  </div>
</aside>
