{% extends "admin/change_form.html" %}
{% load static resume_tags %}

{% block content %}
<div class="cv-admin-lang-strip">
  <div class="cv-admin-lang-strip__inner">
    <div>
      <p class="cv-admin-lang-strip__title">{% uitext "cv_content_lang" %}</p>
      <p class="cv-admin-lang-strip__hint">{% uitext "cv_content_lang_hint" %}</p>
    </div>
    <div class="cv-admin-lang-strip__btns" role="group" aria-label="{% uitext 'cv_content_lang' %}">
      <a href="?content_lang=en" class="cv-lang-pill{% if admin_content_lang == 'en' %} is-active{% endif %}">ENG</a>
      <a href="?content_lang=uz" class="cv-lang-pill{% if admin_content_lang == 'uz' %} is-active{% endif %}">UZB</a>
      <a href="?content_lang=ru" class="cv-lang-pill{% if admin_content_lang == 'ru' %} is-active{% endif %}">RUS</a>
    </div>
  </div>
</div>
{{ block.super }}
{% endblock %}
